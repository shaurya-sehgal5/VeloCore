global:
  scrape_interval: 5s

scrape_configs:

  - job_name: prometheus

    static_configs:

      - targets:
          - localhost:9090

  - job_name: velocore

    metrics_path: /metrics

    static_configs:

      - targets:
          - host.docker.internal:8080

  - job_name: loki

    static_configs:

      - targets:
          - loki:3100
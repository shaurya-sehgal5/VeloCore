version: "3.9"

services:

  prometheus:
    image: prom/prometheus
    container_name: velocore-prometheus

    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml

    ports:
      - "9090:9090"

    restart: unless-stopped

  grafana:
    image: grafana/grafana-oss

    container_name: velocore-grafana

    ports:
      - "3002:3000"

    restart: unless-stopped

    depends_on:
      - prometheus

    volumes:
      - grafana-storage:/var/lib/grafana

volumes:

  grafana-storage:
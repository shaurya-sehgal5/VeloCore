version: "3.9"

services:

  prometheus:
    image: prom/prometheus

    container_name: velocore-prometheus

    ports:
      - "9090:9090"

    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml

    restart: unless-stopped

  grafana:
    image: grafana/grafana

    container_name: velocore-grafana

    ports:
      - "3001:3000"

    restart: unless-stopped

    depends_on:
      - prometheus